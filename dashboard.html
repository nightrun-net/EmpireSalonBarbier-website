/* 🔥 MODAL BACKGROUND */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    backdrop-filter: blur(8px); /* ✨ glass effect */
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:9999;
}

/* SHOW */
.modal.show{
    opacity:1;
    pointer-events:auto;
}

/* 🔥 MODAL BOX (GLASS STYLE) */
.modal-box{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 25px;
    width: 95%;
    max-width: 420px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    transform: translateY(40px) scale(0.9);
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
}

/* ANIMATION */
.modal.show .modal-box{
    transform: translateY(0) scale(1);
}

/* TITLE */
.modal-box h2{
    margin-bottom: 15px;
    font-size: 22px;
    font-weight: 600;
    color: #00c6ff;
}

/* INPUT */
.modal-box input{
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

/* ADD BUTTON */
.modal-box button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

/* PRIMARY */
.modal-box button:hover{
    transform:scale(1.05);
}


.barber-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
    padding:10px;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
    transition:0.2s;
}

.barber-row:hover{
    background:rgba(255,255,255,0.1);
}

/* NAME INPUT */

    padding:8px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

/* ENABLE / DISABLE */
.toggle-btn{

    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-size:12px;
}

/* STATES */
.enable{
    background: linear-gradient(45deg,#00c853,#64dd17);
}

.disable{

}

/* DELETE */

    background: linear-gradient(45deg,#ff4d4d,#b30000);
    color:white;
    border-radius:8px;
    padding:6px 10px;
}

        function fetchAppointments() {
        const now = new Date();
        const todayStr = `${now.getDate()}-${now.getMonth() + 1}-${now.getFullYear()}`;
        const thirtyMinutesLater = new Date(now.getTime() + 30 * 60 * 1000); // ✅ 30 minutes from now

        db.ref("bookings").once("value").then(snapshot => {
        if (!snapshot.exists()) {
            document.getElementById("todaysAppointments").textContent = "0";
            document.getElementById("todaysAppointmentsTable").innerHTML = "<tr><td colspan='6'>No appointments today.</td></tr>";
            document.getElementById("upcomingAppointment").innerHTML = "<p>No upcoming appointments.</p>";
            return;
        }

        let todayCount = 0;
        let appointments = []; // ✅ Store today's appointments
        let upcomingAppointments = []; // ✅ Store upcoming appointments

        snapshot.forEach(childSnapshot => {
            let data = childSnapshot.val();
            let storedDate = data.date ? data.date.trim() : null;
        let storedTime = data.time ? data.time.trim() : null;

        // skip invalid bookings
        if (!storedDate || !storedTime) return;

            if (storedDate === todayStr) {
                let storedDateTime = new Date(
                    parseInt(storedDate.split("-")[2]), 
                    parseInt(storedDate.split("-")[1]) - 1, 
                    parseInt(storedDate.split("-")[0])
                );

                let [hours, minutes] = storedTime.split(":").map(num => parseInt(num));
                storedDateTime.setHours(hours, minutes);

                let appointmentData = {
                    username: data.username,
                    mobile: data.mobile,
                    service: data.service,
                    time: storedTime,
                    status: storedDateTime < now ? `<span class="done-icon">✅ Done</span>` : "",
                    timestamp: storedDateTime.getTime() // ✅ Use timestamp for sorting
                };

                // ✅ Check if appointment is within the next 30 minutes
                if (storedDateTime >= now && storedDateTime <= thirtyMinutesLater) {
                    upcomingAppointments.push(appointmentData);
                }

                appointments.push(appointmentData);
                todayCount++;
            }
        });

        // ✅ Sort appointments by time (earliest first)
        appointments.sort((a, b) => a.timestamp - b.timestamp);

        let todayTableHTML = appointments.map(data => `
            <tr>
                <td>${data.username}</td>
                <td>${data.mobile}</td>
                <td>${data.service}</td>
                <td>${data.barber}</td> <!-- ✅ NEW -->
                <td>${data.time}</td>
                <td>${data.status}</td>
                <td>
                    <button class="call-btn" onclick="callCustomer('${data.mobile}')">Call</button>
                </td>
            </tr>
        `).join("");

        document.getElementById("todaysAppointments").textContent = todayCount;
        document.getElementById("todaysAppointmentsTable").innerHTML = todayTableHTML || "<tr><td colspan='6'>No appointments today.</td></tr>";

        // ✅ Afficher les rendez-vous à venir (30 minutes avant)
if (upcomingAppointments.length > 0) {
    let upcomingHTML = upcomingAppointments.map(data => `
        <p style="color: #ff5733; font-size: 16px; font-weight: bold;">
            ⏳ Prochain : ${data.time} - ${data.username} (${data.service} - ${data.barber})
            <br>📞 <button class="call-btn" onclick="callCustomer('${data.mobile}')">Appeler</button>
        </p>
    `).join("");

    document.getElementById("upcomingAppointment").innerHTML = upcomingHTML;
} else {
    document.getElementById("upcomingAppointment").innerHTML = "<p>Aucun rendez-vous à venir.</p>";
}
    });
    }
    function callCustomer(mobile) {
        window.location.href = `tel:${mobile}`;
    }
        document.addEventListener("DOMContentLoaded", fetchAppointments);
        setInterval(fetchAppointments, 5000);
        function logout() {
    firebase.auth().signOut()
    .then(() => {
        // Redirect to login page after logout
        window.location.href = "login.html";
    })
    .catch((error) => {
        console.log("Logout Error:", error);
        alert("Error logging out");
    });
}

function openBarberModal(){
    document.getElementById("barberModal").classList.add("show");
    loadBarbers();
}

function closeBarberModal(){
    document.getElementById("barberModal").classList.remove("show");
}

// 🔥 LOAD BARBERS FROM FIREBASE
// 🔥 LOAD BARBERS
function loadBarbers(){
    const container = document.getElementById("barberList");
    container.innerHTML = "Loading...";

    db.ref("barbers").on("value", snapshot => {

        if(!snapshot.exists()){
            container.innerHTML = "No barbers found";
            return;
        }

        let html = "";

        snapshot.forEach(child => {
            const data = child.val();
            const id = child.key;

            html += `
                <div class="barber-row">
                    
                    <!-- ✏️ NAME (EDITABLE) -->
                    <input 
                        value="${data.name}" 
                        onchange="editBarber('${id}', this.value)"
                        style="flex:1; padding:5px;"
                    >

                    <!-- ENABLE / DISABLE -->
                    <button 
                        class="toggle-btn ${data.active ? "disable" : "enable"}"
                        onclick="toggleBarber('${id}', ${data.active})"
                    >
                        ${data.active ? "Disable" : "Enable"}
                    </button>

                    <!-- ❌ DELETE -->
                    <button 
                        style="background:red; color:white;"
                        onclick="deleteBarber('${id}')"
                    >
                        X
                    </button>

                </div>
            `;
        });

        container.innerHTML = html;
    });
}
function addBarber(){
    const name = document.getElementById("newBarberName").value.trim();

    if(!name){
        alert("Enter barber name");
        return;
    }

    db.ref("barbers").push({
        name: name,
        active: true
    }).then(() => {
        document.getElementById("newBarberName").value = "";
    });
}

function editBarber(id, newName){
    if(!newName.trim()) return;

    db.ref("barbers/" + id).update({
        name: newName
    });
}

// 🔥 TOGGLE ENABLE / DISABLE
function toggleBarber(id, currentStatus){

    db.ref("barbers/" + id).update({
        active: !currentStatus
    }).then(() => {
        loadBarbers(); // refresh UI
    });
}
    </script>
